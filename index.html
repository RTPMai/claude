<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Printavo Reports</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#F4F6F8;color:#111827;font-family:'Inter',sans-serif;font-size:14px}
.hdr{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{display:flex;align-items:center;gap:10px}
.logomark{width:32px;height:32px;background:#3D9A5C;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:15px;flex-shrink:0}
.hdr-title{font-size:15px;font-weight:700}
.hdr-sub{font-size:12px;color:#6B7280}
.rbtn{background:#3D9A5C;border:none;color:#fff;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.dash{padding:28px 32px}
.dash h2{font-size:22px;font-weight:700}
.dash-sub{font-size:13px;color:#6B7280;margin-top:2px;margin-bottom:24px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:18px 20px;display:flex;justify-content:space-between;align-items:flex-start}
.kpi-lbl{font-size:13px;color:#6B7280;font-weight:500;margin-bottom:5px}
.kpi-val{font-size:26px;font-weight:700;letter-spacing:-.5px}
.kpi-s{font-size:12px;color:#6B7280;margin-top:5px}
.kpi-ico{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ig{background:#EAF5EE}.ir{background:#FEE2E2}.ia{background:#FEF3C7}.ib{background:#EFF6FF}
.card{background:#fff;border:1px solid #E5E7EB;border-radius:10px;margin-bottom:18px;overflow:hidden}
.card-hd{padding:14px 20px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between}
.card-hd h3{font-size:14px;font-weight:600}
.card-hd span{font-size:12px;color:#6B7280}
.card-bd{padding:20px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;letter-spacing:.4px;text-transform:uppercase;color:#6B7280;padding:0 12px 10px 0;font-weight:600}
td{padding:10px 12px 10px 0;border-top:1px solid #E5E7EB;color:#111827}
tr:hover td{background:#F9FAFB}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.pp{background:#FEF3C7;color:#D97706}.pa{background:#EAF5EE;color:#3D9A5C}
.pi{background:#FEE2E2;color:#DC2626}.pq{background:#F3F4F6;color:#6B7280}.pr{background:#EFF6FF;color:#2563EB}
.bars{display:flex;align-items:flex-end;gap:6px;height:130px;margin-top:8px}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.bw{flex:1;width:100%;display:flex;align-items:flex-end;gap:2px}
.bar{border-radius:3px 3px 0 0;width:100%;min-height:2px}
.ba{background:#3D9A5C}.bg{background:#E5E7EB}
.bl{font-size:10px;color:#6B7280;white-space:nowrap}
.leg{display:flex;gap:16px;margin-top:12px}
.li{display:flex;align-items:center;gap:6px;font-size:12px;color:#6B7280}
.ld{width:10px;height:10px;border-radius:2px}
.goals{display:flex;align-items:flex-end;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.gc{display:flex;flex-direction:column;align-items:center;gap:3px}
.gc label{font-size:10px;color:#6B7280}
.gc input{background:#F4F6F8;border:1px solid #E5E7EB;border-radius:5px;padding:5px 6px;color:#111827;font-size:12px;width:68px;outline:none;text-align:center}
.gc input:focus{border-color:#3D9A5C}
.err{background:#FEE2E2;border:1px solid #FECACA;border-radius:8px;padding:14px 18px;color:#DC2626;margin-bottom:18px}
.spin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:80px 32px}
.spinner{width:28px;height:28px;border:3px solid #E5E7EB;border-top-color:#3D9A5C;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.two{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:700px){.two{grid-template-columns:1fr}.dash{padding:16px}.hdr{padding:0 16px}}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">
    <div class="logomark">P</div>
    <div>
      <div class="hdr-title">Printavo Reports</div>
      <div class="hdr-sub" id="shop-name"></div>
    </div>
  </div>
  <button class="rbtn" id="refresh-btn" style="display:none" onclick="loadData()">Refresh</button>
</div>

<div id="loading" class="spin-wrap">
  <div class="spinner"></div>
  <div style="font-size:13px;color:#6B7280">Loading your Printavo data...</div>
</div>

<div id="error-wrap" style="display:none" class="dash">
  <div class="err" id="error-msg"></div>
  <button class="rbtn" onclick="loadData()">Retry</button>
</div>

<div id="dashboard" style="display:none" class="dash">
  <h2>Dashboard</h2>
  <div class="dash-sub">Your shop performance overview</div>
  <div class="kpis" id="kpis"></div>

  <div class="card">
    <div class="card-hd"><h3>Sales by Month vs Goal</h3><span id="chart-year"></span></div>
    <div class="card-bd">
      <div class="goals" id="goals-row"></div>
      <div class="bars" id="bar-chart"></div>
      <div class="leg">
        <div class="li"><div class="ld" style="background:#3D9A5C"></div>Actual</div>
        <div class="li"><div class="ld" style="background:#E5E7EB"></div>Goal</div>
      </div>
    </div>
  </div>

  <div class="two">
    <div class="card">
      <div class="card-hd"><h3>YTD Sales by Contact</h3><span>Top 8</span></div>
      <div class="card-bd" style="padding:12px 20px">
        <table><thead><tr><th>Contact</th><th style="text-align:right">Sales</th></tr></thead>
        <tbody id="user-table"></tbody></table>
      </div>
    </div>
    <div class="card">
      <div class="card-hd"><h3>Recent Quotes</h3><span>Last 8</span></div>
      <div class="card-bd" style="padding:12px 20px">
        <table><thead><tr><th>#</th><th>Name</th><th style="text-align:right">Total</th><th>Status</th></tr></thead>
        <tbody id="quotes-table"></tbody></table>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-hd"><h3>Recent Orders</h3><span>Last 10</span></div>
    <div class="card-bd" style="padding:12px 20px;overflow-x:auto">
      <table><thead><tr><th>#</th><th>Order Name</th><th>Contact</th><th>Created</th><th style="text-align:right">Total</th><th style="text-align:right">Outstanding</th><th>Status</th></tr></thead>
      <tbody id="orders-table"></tbody></table>
    </div>
  </div>
</div>

<script>
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const GQL = `query{invoices(first:25){nodes{id visualId orderedAt totalPrice amountOutstanding createdAt status{name}contact{fullName}}}quotes(first:25){nodes{id visualId createdAt totalPrice status{name}contact{fullName}}}}`;
let goals = Array(12).fill(260000);
let lastData = null;

const fmt = n => new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(n||0);
const fmtN = n => new Intl.NumberFormat("en-US").format(n||0);

function pillClass(s){
  const l=(s||"").toLowerCase();
  if(l.includes("approved")||l.includes("paid")) return "pa";
  if(l.includes("invoice")) return "pi";
  if(l.includes("quote")) return "pq";
  if(l.includes("production")||l.includes("progress")) return "pr";
  return "pp";
}

async function loadData(){
  show("loading"); hide("dashboard"); hide("error-wrap");
  try {
    const res = await fetch("/api/printavo",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({query:GQL})
    });
    if(!res.ok) throw new Error("Proxy returned "+res.status);
    const json = await res.json();
    if(json.errors) throw new Error(json.errors.map(e=>e.message).join(", "));
    if(!json.data) throw new Error("No data returned from Printavo");
    lastData = json.data;
    render(lastData);
  } catch(e) {
    document.getElementById("error-msg").textContent = e.message;
    show("error-wrap"); hide("loading");
  }
}

function render(raw){
  const now = new Date();
  const ys = new Date(now.getFullYear(),0,1);
  const ws = new Date(now); ws.setDate(now.getDate()-now.getDay());
  const inv = (raw.invoices&&raw.invoices.nodes)||[];
  const quo = (raw.quotes&&raw.quotes.nodes)||[];

  const ytdInv = inv.filter(i=>new Date(i.createdAt)>=ys);
  const ytdSales = ytdInv.reduce((s,i)=>s+(parseFloat(i.totalPrice)||0),0);
  const outstanding = inv.reduce((s,i)=>s+(parseFloat(i.amountOutstanding)||0),0);
  const open = inv.filter(i=>!["paid","cancelled"].some(x=>(i.status&&i.status.name||"").toLowerCase().includes(x)));
  // Filter out blank/ignore status records
  const validQuo = quo.filter(q => q.status && q.status.name && !q.status.name.toLowerCase().includes("ignore") && !q.status.name.toLowerCase().includes("blank"));
  const qWeek = validQuo.filter(q=>new Date(q.createdAt)>=ws);
  const monthly = Array(12).fill(0);
  ytdInv.forEach(i=>{const m=new Date(i.createdAt).getMonth();monthly[m]+=(parseFloat(i.totalPrice)||0);});
  const umap={};
  ytdInv.forEach(i=>{const n=(i.contact&&i.contact.fullName)||"Unassigned";umap[n]=(umap[n]||0)+(parseFloat(i.totalPrice)||0);});
  const byUser=Object.entries(umap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const conv=validQuo.length>0?Math.min(100,(inv.length/(inv.length+validQuo.length))*100):0;
  const cm=now.getMonth();
  const cmSales=monthly[cm], cmGoal=goals[cm];
  const pct=cmGoal>0?Math.min(100,(cmSales/cmGoal)*100).toFixed(0):0;

  document.getElementById("shop-name").textContent="P&M Apparel";
  document.getElementById("chart-year").textContent=now.getFullYear();
  document.getElementById("refresh-btn").style.display="";

  // KPIs
  document.getElementById("kpis").innerHTML=`
    <div class="kpi"><div><div class="kpi-lbl">YTD Sales</div><div class="kpi-val" style="color:#3D9A5C">${fmt(ytdSales)}</div><div class="kpi-s">${now.getFullYear()} year to date</div></div><div class="kpi-ico ig">💰</div></div>
    <div class="kpi"><div><div class="kpi-lbl">Outstanding Invoices</div><div class="kpi-val" style="color:#DC2626">${fmt(outstanding)}</div><div class="kpi-s">Unpaid balance</div></div><div class="kpi-ico ir">📄</div></div>
    <div class="kpi"><div><div class="kpi-lbl">Open Orders</div><div class="kpi-val">${fmtN(open.length)}</div><div class="kpi-s">Active orders</div></div><div class="kpi-ico ia">📦</div></div>
    <div class="kpi"><div><div class="kpi-lbl">Quotes This Week</div><div class="kpi-val">${fmtN(qWeek.length)}</div><div class="kpi-s">${fmtN(validQuo.length)} total on record</div></div><div class="kpi-ico ib">📝</div></div>
    <div class="kpi"><div><div class="kpi-lbl">Conversion Rate</div><div class="kpi-val">${conv.toFixed(1)}%</div><div class="kpi-s">Quotes to orders</div></div><div class="kpi-ico ig">📈</div></div>
    <div class="kpi"><div><div class="kpi-lbl">This Month vs Goal</div><div class="kpi-val" style="color:${cmSales>=cmGoal?"#3D9A5C":"#D97706"}">${fmt(cmSales)}</div><div class="kpi-s">Goal: ${fmt(cmGoal)} — ${pct}% attained</div></div><div class="kpi-ico ia">🎯</div></div>
  `;

  // Goals row
  const gr = document.getElementById("goals-row");
  gr.innerHTML='<span style="font-size:12px;color:#6B7280;align-self:center">Monthly goals ($):</span>';
  MONTHS.forEach((m,i)=>{
    const d=document.createElement("div"); d.className="gc";
    d.innerHTML=`<label>${m}</label><input type="number" value="${goals[i]}" data-idx="${i}"/>`;
    d.querySelector("input").addEventListener("change",e=>{goals[parseInt(e.target.dataset.idx)]=parseFloat(e.target.value)||0;renderChart(monthly,cm);});
    gr.appendChild(d);
  });

  renderChart(monthly,cm);

  // Sales by user
  document.getElementById("user-table").innerHTML=byUser.map(([n,a])=>`<tr><td>${n}</td><td style="text-align:right;font-weight:600;color:#3D9A5C">${fmt(a)}</td></tr>`).join("");

  // Quotes
  document.getElementById("quotes-table").innerHTML=validQuo.slice(0,8).map(q=>`<tr>
    <td style="color:#6B7280">${q.visualId||""}</td>
    <td>${(q.contact&&q.contact.fullName)||"—"}</td>
    <td style="text-align:right">${fmt(q.totalPrice)}</td>
    <td><span class="pill ${pillClass(q.status&&q.status.name)}">${(q.status&&q.status.name)||"Quote"}</span></td>
  </tr>`).join("");

  // Orders
  document.getElementById("orders-table").innerHTML=inv.slice(0,10).map(o=>`<tr>
    <td style="color:#6B7280">${o.visualId||""}</td>
    <td style="max-width:160px">${(o.contact&&o.contact.fullName)||"—"}</td>
    <td>${(o.contact&&o.contact.fullName)||"—"}</td>
    <td style="color:#6B7280;white-space:nowrap">${new Date(o.createdAt).toLocaleDateString()}</td>
    <td style="text-align:right;font-weight:600">${fmt(o.totalPrice)}</td>
    <td style="text-align:right;color:${parseFloat(o.amountOutstanding)>0?"#DC2626":"#3D9A5C"}">${fmt(o.amountOutstanding)}</td>
    <td><span class="pill ${pillClass(o.status&&o.status.name)}">${(o.status&&o.status.name)||"—"}</span></td>
  </tr>`).join("");

  hide("loading"); show("dashboard");
}

function renderChart(monthly, cm){
  const max=Math.max(...monthly,...goals,1);
  const bc=document.getElementById("bar-chart");
  bc.innerHTML=MONTHS.slice(0,cm+1).map((m,i)=>{
    const ah=Math.round((monthly[i]/max)*110);
    const gh=Math.round((goals[i]/max)*110);
    return`<div class="bc"><div class="bw"><div class="bar bg" style="height:${gh}px" title="Goal: ${fmt(goals[i])}"></div><div class="bar ba" style="height:${ah}px" title="Actual: ${fmt(monthly[i])}"></div></div><div class="bl">${m}</div></div>`;
  }).join("");
}

function show(id){document.getElementById(id).style.display="";}
function hide(id){document.getElementById(id).style.display="none";}

loadData();
</script>
</body>
</html>
