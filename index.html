<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Printavo Reports</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#F4F6F8;color:#111827;font-family:'Inter',sans-serif}
.app{min-height:100vh}
.hdr{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{display:flex;align-items:center;gap:10px}
.logomark{width:32px;height:32px;background:#3D9A5C;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:15px}
.hdr-title{font-size:15px;font-weight:700}
.hdr-sub{font-size:12px;color:#6B7280}
.rbtn{background:#3D9A5C;border:none;color:#fff;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.rbtn:hover{background:#2F7A48}
.auth-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 56px);padding:24px}
.auth-box{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:36px;width:100%;max-width:440px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.auth-box h2{font-size:20px;font-weight:700;margin-bottom:6px}
.auth-box p{color:#6B7280;font-size:14px;margin-bottom:24px;line-height:1.6}
.fld{margin-bottom:16px}
.fld label{display:block;font-size:12px;font-weight:600;color:#6B7280;margin-bottom:5px}
.fld input{width:100%;background:#F4F6F8;border:1px solid #E5E7EB;border-radius:6px;padding:9px 12px;color:#111827;font-size:14px;outline:none}
.fld input:focus{border-color:#3D9A5C;box-shadow:0 0 0 3px #EAF5EE}
.fld input::placeholder{color:#9CA3AF}
.sbtn{width:100%;padding:10px;background:#3D9A5C;color:#fff;font-weight:600;font-size:14px;border:none;border-radius:6px;cursor:pointer}
.sbtn:hover{background:#2F7A48}
.dash{padding:28px 32px}
.dash h2{font-size:22px;font-weight:700}
.dash-sub{font-size:13px;color:#6B7280;margin-top:2px;margin-bottom:24px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:18px 20px;display:flex;justify-content:space-between;align-items:flex-start}
.kpi-l{display:flex;flex-direction:column;gap:5px}
.kpi-lbl{font-size:13px;color:#6B7280;font-weight:500}
.kpi-val{font-size:26px;font-weight:700;letter-spacing:-.5px}
.kpi-s{font-size:12px;color:#6B7280}
.kpi-ico{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ig{background:#EAF5EE}.ir{background:#FEE2E2}.ia{background:#FEF3C7}.ib{background:#EFF6FF}
.card{background:#fff;border:1px solid #E5E7EB;border-radius:10px;margin-bottom:18px;overflow:hidden}
.card-hd{padding:14px 20px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between}
.card-hd h3{font-size:14px;font-weight:600}
.card-hd span{font-size:12px;color:#6B7280}
.card-bd{padding:20px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:11px;letter-spacing:.4px;text-transform:uppercase;color:#6B7280;padding:0 12px 10px 0;font-weight:600}
.tbl td{padding:10px 12px 10px 0;border-top:1px solid #E5E7EB;color:#111827}
.tbl tr:hover td{background:#F9FAFB}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.pp{background:#FEF3C7;color:#D97706}.pa{background:#EAF5EE;color:#3D9A5C}
.pi{background:#FEE2E2;color:#DC2626}.pq{background:#F3F4F6;color:#6B7280}.pr{background:#EFF6FF;color:#2563EB}
.bars{display:flex;align-items:flex-end;gap:6px;height:130px}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.bw{flex:1;width:100%;display:flex;align-items:flex-end;gap:2px}
.bar{border-radius:3px 3px 0 0;width:100%;min-height:2px}
.ba{background:#3D9A5C}.bg{background:#E5E7EB}
.bl{font-size:10px;color:#6B7280;white-space:nowrap}
.leg{display:flex;gap:16px;margin-top:12px}
.li{display:flex;align-items:center;gap:6px;font-size:12px;color:#6B7280}
.ld{width:10px;height:10px;border-radius:2px}
.gr{display:flex;align-items:flex-end;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.gc{display:flex;flex-direction:column;align-items:center;gap:3px}
.gc span{font-size:10px;color:#6B7280}
.gi{background:#F4F6F8;border:1px solid #E5E7EB;border-radius:5px;padding:5px 6px;color:#111827;font-size:12px;width:68px;outline:none;text-align:center}
.gi:focus{border-color:#3D9A5C}
.err{background:#FEE2E2;border:1px solid #FECACA;border-radius:8px;padding:14px 18px;color:#DC2626;font-size:14px;margin-bottom:18px}
.spin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:80px 32px}
.spinner{width:28px;height:28px;border:3px solid #E5E7EB;border-top-color:#3D9A5C;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.two{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.ai-card{background:#EAF5EE;border:1px solid #BBE4CC;border-radius:10px;padding:18px 22px;margin-bottom:18px}
.ai-lbl{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#3D9A5C;margin-bottom:8px}
.ai-card p{font-size:14px;line-height:1.7;color:#111827}
@media(max-width:700px){.two{grid-template-columns:1fr}.dash{padding:16px}.hdr{padding:0 16px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect } = React;
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const fmt  = n => new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(n??0);
const fmtN = n => new Intl.NumberFormat("en-US").format(n??0);
const PROXY = "/api/printavo";
const GQL = `query{account{name}invoices(first:100,sortOn:CREATED_AT,direction:DESC){nodes{id visualId name total amountOutstanding createdAt status{name}contact{fullName}}}quotes(first:100,sortOn:CREATED_AT,direction:DESC){nodes{id visualId name total createdAt status{name}contact{fullName}}}}`;

function pill(s=""){
  const l=s.toLowerCase();
  if(l.includes("approved")||l.includes("paid")) return <span className="pill pa">{s}</span>;
  if(l.includes("invoice")) return <span className="pill pi">{s}</span>;
  if(l.includes("quote"))   return <span className="pill pq">{s}</span>;
  if(l.includes("production")||l.includes("progress")) return <span className="pill pr">{s}</span>;
  return <span className="pill pp">{s}</span>;
}

async function loadPrintavo(){
  const res = await fetch(PROXY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({query:GQL})});
  if(!res.ok) throw new Error(`Proxy returned ${res.status}`);
  const json = await res.json();
  if(json.errors) throw new Error(json.errors.map(e=>e.message).join(", "));
  if(!json.data) throw new Error("No data returned");
  return json.data;
}

function process(raw,goals){
  const now=new Date(), ys=new Date(now.getFullYear(),0,1), ws=new Date(now);
  ws.setDate(now.getDate()-now.getDay());
  const inv=raw.invoices?.nodes||[], quo=raw.quotes?.nodes||[];
  const ytdInv=inv.filter(i=>new Date(i.createdAt)>=ys);
  const ytdSales=ytdInv.reduce((s,i)=>s+(parseFloat(i.total)||0),0);
  const outstanding=inv.reduce((s,i)=>s+(parseFloat(i.amountOutstanding)||0),0);
  const open=inv.filter(i=>!["paid","cancelled"].some(x=>(i.status?.name||"").toLowerCase().includes(x)));
  const qWeek=quo.filter(q=>new Date(q.createdAt)>=ws);
  const monthly=Array(12).fill(0);
  ytdInv.forEach(i=>{const m=new Date(i.createdAt).getMonth();monthly[m]+=(parseFloat(i.total)||0);});
  const umap={};
  ytdInv.forEach(i=>{const n=i.contact?.fullName||"Unassigned";umap[n]=(umap[n]||0)+(parseFloat(i.total)||0);});
  const byUser=Object.entries(umap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const conv=quo.length>0?Math.min(100,(inv.length/(inv.length+quo.length))*100):0;
  const cm=now.getMonth();
  return {shop:raw.account?.name||"Your Shop",ytdSales,outstanding,open:open.length,qWeek:qWeek.length,
    totalQ:quo.length,conv,monthly,byUser,orders:inv.slice(0,10),quotes:quo.slice(0,8),
    cmSales:monthly[cm],cmGoal:goals[cm],cm};
}

function Chart({monthly,goals,cm}){
  const max=Math.max(...monthly,...goals,1);
  return(<div>
    <div className="bars">
      {MONTHS.map((m,i)=>{
        if(i>cm) return null;
        const ah=Math.round((monthly[i]/max)*110), gh=Math.round((goals[i]/max)*110);
        return(<div className="bc" key={m}><div className="bw">
          <div className="bar bg" style={{height:`${gh}px`}}/>
          <div className="bar ba" style={{height:`${ah}px`}}/>
        </div><div className="bl">{m}</div></div>);
      })}
    </div>
    <div className="leg">
      <div className="li"><div className="ld" style={{background:"#3D9A5C"}}/>Actual</div>
      <div className="li"><div className="ld" style={{background:"#E5E7EB"}}/>Goal</div>
    </div>
  </div>);
}

function App(){
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [data,setData]=useState(null);
  const [goals,setGoals]=useState(Array(12).fill(25000));

  const load=useCallback(async()=>{
    setLoading(true);setErr("");
    try{const raw=await loadPrintavo();setData(process(raw,goals));}
    catch(e){setErr(e.message);}
    finally{setLoading(false);}
  },[goals]);

  useEffect(()=>{load();},[]);

  function setGoal(i,v){setGoals(g=>{const n=[...g];n[i]=parseFloat(v)||0;return n;});}
  const pct=data&&data.cmGoal>0?Math.min(100,(data.cmSales/data.cmGoal)*100).toFixed(0):0;

  return(<div className="app">
    <div className="hdr">
      <div className="logo">
        <div className="logomark">P</div>
        <div><div className="hdr-title">Printavo Reports</div>
        {data&&<div className="hdr-sub">{data.shop}</div>}</div>
      </div>
      {data&&!loading&&<button className="rbtn" onClick={load}>Refresh</button>}
    </div>

    {loading?(<div className="spin-wrap"><div className="spinner"/><div style={{fontSize:13,color:"#6B7280"}}>Loading your Printavo data...</div></div>)
    :err?(<div className="dash"><div className="err">{err}<br/><br/><button className="sbtn" style={{width:"auto",padding:"8px 16px",marginTop:8}} onClick={load}>Retry</button></div></div>)
    :!data?(<div className="spin-wrap"><div className="spinner"/></div>)
    :(<div className="dash">
      <h2>Dashboard</h2>
      <div className="dash-sub">Your shop performance overview</div>

      <div className="kpis">
        <div className="kpi"><div className="kpi-l"><div className="kpi-lbl">YTD Sales</div><div className="kpi-val" style={{color:"#3D9A5C"}}>{fmt(data.ytdSales)}</div><div className="kpi-s">{new Date().getFullYear()} year to date</div></div><div className="kpi-ico ig">💰</div></div>
        <div className="kpi"><div className="kpi-l"><div className="kpi-lbl">Outstanding Invoices</div><div className="kpi-val" style={{color:"#DC2626"}}>{fmt(data.outstanding)}</div><div className="kpi-s">Unpaid balance</div></div><div className="kpi-ico ir">📄</div></div>
        <div className="kpi"><div className="kpi-l"><div className="kpi-lbl">Open Orders</div><div className="kpi-val">{fmtN(data.open)}</div><div className="kpi-s">Active orders</div></div><div className="kpi-ico ia">📦</div></div>
        <div className="kpi"><div className="kpi-l"><div className="kpi-lbl">Quotes This Week</div><div className="kpi-val">{fmtN(data.qWeek)}</div><div className="kpi-s">{fmtN(data.totalQ)} total on record</div></div><div className="kpi-ico ib">📝</div></div>
        <div className="kpi"><div className="kpi-l"><div className="kpi-lbl">Conversion Rate</div><div className="kpi-val">{data.conv.toFixed(1)}%</div><div className="kpi-s">Quotes to orders</div></div><div className="kpi-ico ig">📈</div></div>
        <div className="kpi"><div className="kpi-l"><div className="kpi-lbl">This Month vs Goal</div><div className="kpi-val" style={{color:data.cmSales>=data.cmGoal?"#3D9A5C":"#D97706"}}>{fmt(data.cmSales)}</div><div className="kpi-s">Goal: {fmt(data.cmGoal)} — {pct}% attained</div></div><div className="kpi-ico ia">🎯</div></div>
      </div>

      <div className="card">
        <div className="card-hd"><h3>Sales by Month vs Goal</h3><span>{new Date().getFullYear()}</span></div>
        <div className="card-bd">
          <div className="gr">
            <span style={{fontSize:12,color:"#6B7280"}}>Monthly goals ($):</span>
            {MONTHS.map((m,i)=>(<div className="gc" key={m}><span>{m}</span><input className="gi" type="number" value={goals[i]} onChange={e=>setGoal(i,e.target.value)}/></div>))}
          </div>
          <Chart monthly={data.monthly} goals={goals} cm={data.cm}/>
        </div>
      </div>

      <div className="two">
        <div className="card">
          <div className="card-hd"><h3>YTD Sales by Contact</h3><span>Top 8</span></div>
          <div className="card-bd" style={{padding:"12px 20px"}}>
            <table className="tbl"><thead><tr><th>Contact</th><th style={{textAlign:"right"}}>Sales</th></tr></thead>
            <tbody>{data.byUser.map(([n,a])=>(<tr key={n}><td>{n}</td><td style={{textAlign:"right",fontWeight:600,color:"#3D9A5C"}}>{fmt(a)}</td></tr>))}</tbody></table>
          </div>
        </div>
        <div className="card">
          <div className="card-hd"><h3>Recent Quotes</h3><span>Last 8</span></div>
          <div className="card-bd" style={{padding:"12px 20px"}}>
            <table className="tbl"><thead><tr><th>#</th><th>Name</th><th style={{textAlign:"right"}}>Total</th><th>Status</th></tr></thead>
            <tbody>{data.quotes.map(q=>(<tr key={q.id}><td style={{color:"#6B7280"}}>{q.visualId}</td><td>{q.name||q.contact?.fullName||"—"}</td><td style={{textAlign:"right"}}>{fmt(q.total)}</td><td>{pill(q.status?.name||"Quote")}</td></tr>))}</tbody></table>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-hd"><h3>Recent Orders</h3><span>Last 10</span></div>
        <div className="card-bd" style={{padding:"12px 20px",overflowX:"auto"}}>
          <table className="tbl">
            <thead><tr><th>#</th><th>Order Name</th><th>Contact</th><th>Created</th><th style={{textAlign:"right"}}>Total</th><th style={{textAlign:"right"}}>Outstanding</th><th>Status</th></tr></thead>
            <tbody>{data.orders.map(o=>(<tr key={o.id}>
              <td style={{color:"#6B7280"}}>{o.visualId}</td>
              <td style={{maxWidth:160}}>{o.name||"—"}</td>
              <td>{o.contact?.fullName||"—"}</td>
              <td style={{color:"#6B7280",whiteSpace:"nowrap"}}>{new Date(o.createdAt).toLocaleDateString()}</td>
              <td style={{textAlign:"right",fontWeight:600}}>{fmt(o.total)}</td>
              <td style={{textAlign:"right",color:parseFloat(o.amountOutstanding)>0?"#DC2626":"#3D9A5C"}}>{fmt(o.amountOutstanding)}</td>
              <td>{pill(o.status?.name||"")}</td>
            </tr>))}</tbody>
          </table>
        </div>
      </div>
    </div>)}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
